schema: spec-driven

context: |
  本项目的 OpenSpec 文档面向中文维护者。
  除路径、命令、代码符号、变更名、能力名、文件名和 OpenSpec 固定字段外，所有生成或更新的 OpenSpec 文档内容都必须使用简体中文。
  变更名、能力名和目录名继续使用 kebab-case 英文，便于命令行和文件系统使用。

rules:
  proposal:
    - 使用简体中文撰写。
    - 将模板标题翻译为中文；例如 Why 写为“为什么”，What Changes 写为“变更内容”，Impact 写为“影响”。
    - 路径、命令、代码符号、变更名和能力名保持原文。
  design:
    - 使用简体中文撰写。
    - 将模板标题翻译为中文；保留必要的英文技术术语和代码符号。
    - 说明设计取舍时优先引用本仓库 `context/` 知识库中的术语。
  tasks:
    - 使用简体中文撰写任务标题和任务描述。
    - 保持 Markdown 任务复选框格式，例如 `- [ ] 1.1 ...`。
    - 路径、命令、代码符号、变更名和能力名保持原文。
  specs:
    - 使用简体中文撰写需求、场景和说明。
    - OpenSpec 关键字、能力名、路径、命令和代码符号保持原文。
